<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Chess AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #menuScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .menu-title {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px #00ffff;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .menu-button {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            background: linear-gradient(45deg, #333, #555);
            border: 2px solid #00ffff;
            color: white;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            min-width: 250px;
            text-align: center;
        }

        .menu-button:hover {
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 255, 255, 0.3);
        }

        .color-selection {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .color-button {
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            background: #333;
            border: 2px solid #666;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .color-button.selected {
            border-color: #00ffff;
            background: rgba(0, 255, 255, 0.2);
        }

        #gameUI {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ui-panel {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #00ffff;
            backdrop-filter: blur(10px);
        }

        .game-info {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .game-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .control-button {
            padding: 8px 16px;
            background: linear-gradient(45deg, #333, #555);
            border: 1px solid #00ffff;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .control-button:hover {
            background: linear-gradient(45deg, #00ffff, #0088ff);
            transform: translateY(-1px);
        }

        .control-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #statusPanel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            text-align: center;
            z-index: 100;
        }

        .status-message {
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #00ffff;
            display: inline-block;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
        }

        #threeCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            z-index: 200;
        }

        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #00ffff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .menu-title {
                font-size: 2.5rem;
            }
            
            .menu-button {
                font-size: 1rem;
                padding: 0.8rem 1.5rem;
                min-width: 200px;
            }
            
            #gameUI {
                top: 10px;
                left: 10px;
                right: 10px;
            }
            
            .ui-panel {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="menuScreen">
            <h1 class="menu-title">3D Chess AI</h1>
            <div class="menu-options">
                <div class="color-selection">
                    <div class="color-button selected" data-color="white">Play as White</div>
                    <div class="color-button" data-color="black">Play as Black</div>
                </div>
                <button class="menu-button" data-difficulty="easy">Easy AI</button>
                <button class="menu-button" data-difficulty="medium">Medium AI</button>
                <button class="menu-button" data-difficulty="hard">Hard AI</button>
                <button class="menu-button" id="aiVsAiBtn">Watch AI vs AI</button>
            </div>
        </div>

        <div id="gameUI" style="display: none;">
            <div class="ui-panel">
                <div class="game-info">
                    <div>Turn: <span id="currentPlayer">White</span></div>
                    <div>Difficulty: <span id="difficultyDisplay">Easy</span></div>
                    <div>Status: <span id="gameStatus">Playing</span></div>
                </div>
                <div class="game-controls">
                    <button class="control-button" id="undoBtn">Undo Move</button>
                    <button class="control-button" id="restartBtn">Restart Game</button>
                    <button class="control-button" id="menuBtn">Main Menu</button>
                </div>
            </div>
        </div>

        <div id="statusPanel">
            <div class="status-message" id="statusMessage">Welcome to 3D Chess!</div>
        </div>

        <canvas id="threeCanvas"></canvas>
    </div>

                    c, 0, s, 0,
                    0, 1, 0, 0,
                    -s, 0, c, 0,
                    0, 0, 0, 1
                );
                return this;
            }
            
            multiply(m) {
                return this.multiplyMatrices(this, m);
            }
            
            multiplyMatrices(a, b) {
                const ae = a.elements;
                const be = b.elements;
                const te = this.elements;
                
                const a11 = ae[0], a12 = ae[4], a13 = ae[8], a14 = ae[12];
                const a21 = ae[1], a22 = ae[5], a23 = ae[9], a24 = ae[13];
                const a31 = ae[2], a32 = ae[6], a33 = ae[10], a34 = ae[14];
                const a41 = ae[3], a42 = ae[7], a43 = ae[11], a44 = ae[15];
                
                const b11 = be[0], b12 = be[4], b13 = be[8], b14 = be[12];
                const b21 = be[1], b22 = be[5], b23 = be[9], b24 = be[13];
                const b31 = be[2], b32 = be[6], b33 = be[10], b34 = be[14];
                const b41 = be[3], b42 = be[7], b43 = be[11], b44 = be[15];
                
                te[0] = a11 * b11 + a12 * b21 + a13 * b31 + a14 * b41;
                te[4] = a11 * b12 + a12 * b22 + a13 * b32 + a14 * b42;
                te[8] = a11 * b13 + a12 * b23 + a13 * b33 + a14 * b43;
                te[12] = a11 * b14 + a12 * b24 + a13 * b34 + a14 * b44;
                
                te[1] = a21 * b11 + a22 * b21 + a23 * b31 + a24 * b41;
                te[5] = a21 * b12 + a22 * b22 + a23 * b32 + a24 * b42;
                te[9] = a21 * b13 + a22 * b23 + a23 * b33 + a24 * b43;
                te[13] = a21 * b14 + a22 * b24 + a23 * b34 + a24 * b44;
                
                te[2] = a31 * b11 + a32 * b21 + a33 * b31 + a34 * b41;
                te[6] = a31 * b12 + a32 * b22 + a33 * b32 + a34 * b42;
                te[10] = a31 * b13 + a32 * b23 + a33 * b33 + a34 * b43;
                te[14] = a31 * b14 + a32 * b24 + a33 * b34 + a34 * b44;
                
                te[3] = a41 * b11 + a42 * b21 + a43 * b31 + a44 * b41;
                te[7] = a41 * b12 + a42 * b22 + a43 * b32 + a44 * b42;
                te[11] = a41 * b13 + a42 * b23 + a43 * b33 + a44 * b43;
                te[15] = a41 * b14 + a42 * b24 + a43 * b34 + a44 * b44;
                
                return this;
            }
            
            makePerspective(left, right, top, bottom, near, far) {
                const te = this.elements;
                const x = 2 * near / (right - left);
                const y = 2 * near / (top - bottom);
                const a = (right + left) / (right - left);
                const b = (top + bottom) / (top - bottom);
                const c = -(far + near) / (far - near);
                const d = -2 * far * near / (far - near);
                
                te[0] = x; te[4] = 0; te[8] = a; te[12] = 0;
                te[1] = 0; te[5] = y; te[9] = b; te[13] = 0;
                te[2] = 0; te[6] = 0; te[10] = c; te[14] = d;
                te[3] = 0; te[7] = 0; te[11] = -1; te[15] = 0;
                
                return this;
            }
        }

        // Simple 3D renderer
        class Simple3DRenderer {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.width = canvas.width;
                this.height = canvas.height;
                this.camera = {
                    position: new Vector3(0, 8, 10),
                    rotation: new Vector3(-0.3, 0, 0),
                    fov: 45
                };
                this.objects = [];
                this.lights = [];
                
                this.resize();
            }
            
            resize() {
                const rect = this.canvas.getBoundingClientRect();
                this.canvas.width = rect.width * window.devicePixelRatio;
                this.canvas.height = rect.height * window.devicePixelRatio;
                this.ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
                this.width = rect.width;
                this.height = rect.height;
            }
            
            project(point) {
                // Simple perspective projection
                const distance = this.camera.position.z;
                const scale = distance / (distance - point.z);
                const x = (point.x * scale * 60) + this.width / 2;
                const y = (point.y * scale * -60) + this.height / 2;
                return { x, y, z: point.z };
            }
            
            render() {
                this.ctx.clearRect(0, 0, this.width, this.height);
                
                // Sort objects by depth
                const sortedObjects = [...this.objects].sort((a, b) => 
                    b.position.z - a.position.z
                );
                
                for (const obj of sortedObjects) {
                    this.renderObject(obj);
                }
            }
            
            renderObject(obj) {
                const projected = this.project(obj.position);
                
                this.ctx.save();
                this.ctx.translate(projected.x, projected.y);
                
                // Simple lighting calculation
                const lightIntensity = this.calculateLighting(obj.position);
                
                if (obj.type === 'cube') {
                    this.renderCube(obj, lightIntensity);
                } else if (obj.type === 'piece') {
                    this.renderPiece(obj, lightIntensity);
                }
                
                this.ctx.restore();
            }
            
            calculateLighting(position) {
                // Simple ambient + directional lighting
                const ambient = 0.3;
                const directional = 0.7;
                const lightDir = new Vector3(1, 1, 1).normalize();
                return ambient + directional * Math.max(0, 0.5);
            }
            
            renderCube(obj, lightIntensity) {
                const size = obj.size * 30;
                const color = this.applyLighting(obj.color, lightIntensity);
                
                // Draw square (simplified cube)
                this.ctx.fillStyle = color;
                this.ctx.fillRect(-size/2, -size/2, size, size);
                
                if (obj.highlight) {
                    this.ctx.strokeStyle = obj.highlight;
                    this.ctx.lineWidth = 3;
                    this.ctx.strokeRect(-size/2, -size/2, size, size);
                }
            }
            
            renderPiece(obj, lightIntensity) {
                const size = obj.size * 25;
                const color = this.applyLighting(obj.color, lightIntensity);
                
                this.ctx.fillStyle = color;
                this.ctx.font = `${size}px Arial`;
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';
                this.ctx.fillText(obj.symbol, 0, 0);
                
                // Add shadow for depth
                this.ctx.fillStyle = 'rgba(0,0,0,0.3)';
                this.ctx.fillText(obj.symbol, 2, 2);
            }
            
            applyLighting(color, intensity) {
                // Simple color intensity modification
                const rgb = this.hexToRgb(color);
                if (!rgb) return color;
                
                const r = Math.min(255, rgb.r * intensity);
                const g = Math.min(255, rgb.g * intensity);
                const b = Math.min(255, rgb.b * intensity);
                
                return `rgb(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)})`;
            }
            
            hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : null;
            }
            
            addObject(obj) {
                this.objects.push(obj);
            }
            
            removeObject(obj) {
                const index = this.objects.indexOf(obj);
                if (index > -1) {
                    this.objects.splice(index, 1);
                }
            }
            
            clear() {
                this.objects = [];
            }
        }

        // Chess Game Implementation
        class ChessGame3D {
            constructor() {
                this.chess = new Chess();
                this.renderer = null;
                this.canvas = null;
                this.difficulty = 'easy';
                this.playerColor = 'white';
                this.isAiVsAi = false;
                this.selectedSquare = null;
                this.highlightedSquares = [];
                this.boardObjects = [];
                this.pieceObjects = new Map();
                this.isPlayerTurn = true;
                this.gameStats = this.loadStats();
                
                this.initializeGame();
                this.setupEventListeners();
            }
            
            initializeGame() {
                this.canvas = document.getElementById('threeCanvas');
                this.renderer = new Simple3DRenderer(this.canvas);
                
                this.createBoard();
                this.createPieces();
                this.updateDisplay();
            }
            
            createBoard() {
                this.boardObjects = [];
                
                for (let rank = 0; rank < 8; rank++) {
                    for (let file = 0; file < 8; file++) {
                        const square = String.fromCharCode(97 + file) + (8 - rank);
                        const isLight = (rank + file) % 2 === 0;
                        
                        const boardSquare = {
                            type: 'cube',
                            position: new Vector3(file - 3.5, 0, rank - 3.5),
                            size: 1,
                            color: isLight ? '#f0d9b5' : '#b58863',
                            square: square,
                            highlight: null
                        };
                        
                        this.boardObjects.push(boardSquare);
                        this.renderer.addObject(boardSquare);
                    }
                }
            }
            
            createPieces() {
                this.pieceObjects.clear();
                
                const pieces = this.chess.board();
                for (let rank = 0; rank < 8; rank++) {
                    for (let file = 0; file < 8; file++) {
                        const piece = pieces[rank][file];
                        if (piece) {
                            this.createPiece(piece, file, rank);
                        }
                    }
                }
            }
            
            createPiece(piece, file, rank) {
                const symbols = {
                    'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚',
                    'P': '♙', 'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔'
                };
                
                const symbol = piece.color === 'w' ? 
                    symbols[piece.type.toUpperCase()] : 
                    symbols[piece.type.toLowerCase()];
                
                const pieceObj = {
                    type: 'piece',
                    position: new Vector3(file - 3.5, 0.5, rank - 3.5),
                    size: 1.2,
                    color: piece.color === 'w' ? '#ffffff' : '#333333',
                    symbol: symbol,
                    piece: piece,
                    square: piece.square
                };
                
                this.pieceObjects.set(piece.square, pieceObj);
                this.renderer.addObject(pieceObj);
            }
            
            setupEventListeners() {
                // Menu event listeners
                document.querySelectorAll('.color-button').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.color-button').forEach(b => b.classList.remove('selected'));
                        e.target.classList.add('selected');
                        this.playerColor = e.target.dataset.color;
                    });
                });
                
                document.querySelectorAll('.menu-button').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const difficulty = e.target.dataset.difficulty;
                        if (difficulty) {
                            this.startGame(difficulty);
                        }
                    });
                });
                
                document.getElementById('aiVsAiBtn').addEventListener('click', () => {
                    this.startAiVsAi();
                });
                
                // Game control listeners
                document.getElementById('undoBtn').addEventListener('click', () => {
                    this.undoMove();
                });
                
                document.getElementById('restartBtn').addEventListener('click', () => {
                    this.restartGame();
                });
                
                document.getElementById('menuBtn').addEventListener('click', () => {
                    this.showMenu();
                });
                
                // Canvas click listener
                this.canvas.addEventListener('click', (e) => {
                    this.handleCanvasClick(e);
                });
                
                // Window resize listener
                window.addEventListener('resize', () => {
                    this.renderer.resize();
                    this.renderer.render();
                });
            }
            
            startGame(difficulty) {
                this.difficulty = difficulty;
                this.isAiVsAi = false;
                this.chess.reset();
                this.isPlayerTurn = this.playerColor === 'white';
                
                document.getElementById('menuScreen').style.display = 'none';
                document.getElementById('gameUI').style.display = 'block';
                document.getElementById('difficultyDisplay').textContent = 
                    difficulty.charAt(0).toUpperCase() + difficulty.slice(1);
                
                this.createPieces();
                this.updateDisplay();
                this.updateStatus('Game started! Good luck!');
                
                if (!this.isPlayerTurn) {
                    setTimeout(() => this.makeAIMove(), 1000);
                }
                
                this.startRenderLoop();
            }
            
            startAiVsAi() {
                this.isAiVsAi = true;
                this.difficulty = 'medium';
                this.chess.reset();
                
                document.getElementById('menuScreen').style.display = 'none';
                document.getElementById('gameUI').style.display = 'block';
                document.getElementById('difficultyDisplay').textContent = 'AI vs AI';
                
                this.createPieces();
                this.updateDisplay();
                this.updateStatus('AI vs AI - Watch the battle!');
                
                this.startRenderLoop();
                this.playAiVsAi();
            }
            
            async playAiVsAi() {
                while (!this.chess.game_over()) {
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    if (this.chess.game_over()) break;
                    
                    this.makeAIMove();
                    this.updateDisplay();
                }
            }
            
            startRenderLoop() {
                const animate = () => {
                    this.renderer.render();
                    requestAnimationFrame(animate);
                };
                animate();
            }
            
            handleCanvasClick(event) {
                if (this.isAiVsAi || (!this.isPlayerTurn && !this.isAiVsAi)) return;
                
                const rect = this.canvas.getBoundingClientRect();
                const x = event.clientX - rect.left;
                const y = event.clientY - rect.top;
                
                // Simple click detection - map screen coordinates to board squares
                const file = Math.floor((x / rect.width) * 8);
                const rank = Math.floor((y / rect.height) * 8);
                
                if (file >= 0 && file < 8 && rank >= 0 && rank < 8) {
                    const square = String.fromCharCode(97 + file) + (8 - rank);
                    this.handleSquareClick(square);
                }
            }
            
            handleSquareClick(square) {
                if (this.selectedSquare === square) {
                    this.clearSelection();
                    return;
                }
                
                if (this.selectedSquare) {
                    // Try to make a move
                    const move = this.chess.move({
                        from: this.selectedSquare,
                        to: square,
                        promotion: 'q' // Always promote to queen for simplicity
                    });
                    
                    if (move) {
                        this.playSound('move');
                        this.clearSelection();
                        this.updatePieces();
                        this.updateDisplay();
                        
                        if (this.chess.in_check()) {
                            this.playSound('check');
                        }
                        
                        if (this.chess.game_over()) {
                            this.handleGameOver();
                            return;
                        }
                        
                        this.isPlayerTurn = false;
                        setTimeout(() => this.makeAIMove(), 500);
                    } else {
                        this.clearSelection();
                        this.selectSquare(square);
                    }
                } else {
                    this.selectSquare(square);
                }
            }
            
            selectSquare(square) {
                const piece = this.chess.get(square);
                if (!piece || piece.color !== this.chess.turn()) return;
                
                this.selectedSquare = square;
                this.highlightSquare(square, '#00ffff');
                
                // Highlight legal moves
                const moves = this.chess.moves({ square: square, verbose: true });
                moves.forEach(move => {
                    this.highlightSquare(move.to, '#ffff00');
                });
                
                this.renderer.render();
            }
            
            clearSelection() {
                this.selectedSquare = null;
                this.clearHighlights();
                this.renderer.render();
            }
            
            highlightSquare(square, color) {
                const boardSquare = this.boardObjects.find(obj => obj.square === square);
                if (boardSquare) {
                    boardSquare.highlight = color;
                }
            }
            
            clearHighlights() {
                this.boardObjects.forEach(obj => {
                    obj.highlight = null;
                });
            }
            
            updatePieces() {
                // Clear existing pieces
                this.pieceObjects.forEach(piece => {
                    this.renderer.removeObject(piece);
                });
                this.pieceObjects.clear();
                
                // Create new pieces based on current board state
                this.createPieces();
            }
            
            makeAIMove() {
                if (this.chess.game_over()) return;
                
                const moves = this.chess.moves();
                if (moves.length === 0) return;
                
                let selectedMove;
                
                if (this.difficulty === 'easy') {
                    // Random move
                    selectedMove = moves[Math.floor(Math.random() * moves.length)];
                } else if (this.difficulty === 'medium') {
                    // Simple evaluation
                    selectedMove = this.getBestMove(2);
                } else {
                    // Hard difficulty - deeper search
                    selectedMove = this.getBestMove(4);
                }
                
                const move = this.chess.move(selectedMove);
                if (move) {
                    this.playSound('move');
                    this.updatePieces();
                    this.updateDisplay();
                    
                    if (this.chess.in_check()) {
                        this.playSound('check');
                    }
                    
                    if (this.chess.game_over()) {
                        this.handleGameOver();
                        return;
                    }
                    
                    if (!this.isAiVsAi) {
                        this.isPlayerTurn = true;
                    }
                }
            }
            
            getBestMove(depth) {
                const moves = this.chess.moves();
                let bestMove = moves[0];
                let bestValue = -Infinity;
                
                for (const move of moves) {
                    this.chess.move(move);
                    const value = this.minimax(depth - 1, -Infinity, Infinity, false);
                    this.chess.undo();
                    
                    if (value > bestValue) {
                        bestValue = value;
                        bestMove = move;
                    }
                }
                
                return bestMove;
            }
            
            minimax(depth, alpha, beta, maximizingPlayer) {
                if (depth === 0 || this.chess.game_over()) {
                    return this.evaluateBoard();
                }
                
                const moves = this.chess.moves();
                
                if (maximizingPlayer) {
                    let maxEval = -Infinity;
                    for (const move of moves) {
                        this.chess.move(move);
                        const eval = this.minimax(depth - 1, alpha, beta, false);
                        this.chess.undo();
                        maxEval = Math.max(maxEval, eval);
                        alpha = Math.max(alpha, eval);
                        if (beta <= alpha) break;
                    }
                    return maxEval;
                } else {
                    let minEval = Infinity;
                    for (const move of moves) {
                        this.chess.move(move);
                        const eval = this.minimax(depth - 1, alpha, beta, true);
                        this.chess.undo();
                        minEval = Math.min(minEval, eval);
                        beta = Math.min(beta, eval);
                        if (beta <= alpha) break;
                    }
                    return minEval;
                }
            }
            
            evaluateBoard() {
                const pieceValues = {
                    'p': 1, 'n': 3, 'b': 3, 'r': 5, 'q': 9, 'k': 0
                };
                
                let score = 0;
                const board = this.chess.board();
                
                for (let rank = 0; rank < 8; rank++) {
                    for (let file = 0; file < 8; file++) {
                        const piece = board[rank][file];
                        if (piece) {
                            const value = pieceValues[piece.type] || 0;
                            score += piece.color === 'w' ? value : -value;
                        }
                    }
                }
                
                // Add positional bonuses
                if (this.chess.in_checkmate()) {
                    score += this.chess.turn() === 'w' ? -1000 : 1000;
                } else if (this.chess.in_check()) {
                    score += this.chess.turn() === 'w' ? -50 : 50;
                }
                
                return this.chess.turn() === 'w' ? score : -score;
            }
            
            updateDisplay() {
                document.getElementById('currentPlayer').textContent = 
                    this.chess.turn() === 'w' ? 'White' : 'Black';
                
                let status = 'Playing';
                if (this.chess.in_checkmate()) {
                    status = 'Checkmate';
                } else if (this.chess.in_check()) {
                    status = 'Check';
                } else if (this.chess.in_stalemate()) {
                    status = 'Stalemate';
                } else if (this.chess.in_draw()) {
                    status = 'Draw';
                }
                
                document.getElementById('gameStatus').textContent = status;
            }
            
            handleGameOver() {
                let message = '';
                let result = '';
                
                if (this.chess.in_checkmate()) {
                    const winner = this.chess.turn() === 'w' ? 'Black' : 'White';
                    message = `Checkmate! ${winner} wins!`;
                    result = winner.toLowerCase() === this.playerColor ? 'win' : 'loss';
                } else if (this.chess.in_stalemate()) {
                    message = 'Stalemate! It\'s a draw!';
                    result = 'draw';
                } else if (this.chess.in_draw()) {
                    message = 'Draw!';
                    result = 'draw';
                }
                
                this.updateStatus(message);
                this.playSound('gameOver');
                
                if (!this.isAiVsAi) {
                    this.updateStats(result);
                }
            }
            
            undoMove() {
                if (this.chess.history().length === 0) return;
                
                // Undo player move
                this.chess.undo();
                
                // Undo AI move if it exists
                if (this.chess.history().length > 0 && !this.isAiVsAi) {
                    this.chess.undo();
                }
                
                this.updatePieces();
                this.updateDisplay();
                this.clearSelection();
                this.isPlayerTurn = true;
            }
            
            restartGame() {
                this.chess.reset();
                this.updatePieces();
                this.updateDisplay();
                this.clearSelection();
                this.isPlayerTurn = this.playerColor === 'white';
                this.updateStatus('Game restarted!');
                
                if (!this.isPlayerTurn && !this.isAiVsAi) {
                    setTimeout(() => this.makeAIMove(), 1000);
                } else if (this.isAiVsAi) {
                    this.playAiVsAi();
                }
            }
            
            showMenu() {
                document.getElementById('menuScreen').style.display = 'flex';
                document.getElementById('gameUI').style.display = 'none';
            }
            
            updateStatus(message) {
                document.getElementById('statusMessage').textContent = message;
            }
            
            playSound(type) {
                // Create simple audio feedback using Web Audio API
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                switch (type) {
                    case 'move':
                        oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                        break;
                    case 'capture':
                        oscillator.frequency.setValueAtTime(550, audioCtx.currentTime);
                        break;
                    case 'check':
                        oscillator.frequency.setValueAtTime(660, audioCtx.currentTime);
                        break;
                    case 'gameOver':
                        oscillator.frequency.setValueAtTime(220, audioCtx.currentTime);
                        break;
                }
                
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
            
            loadStats() {
                const stats = localStorage.getItem('chess3d_stats');
                return stats ? JSON.parse(stats) : { wins: 0, losses: 0, draws: 0 };
            }
            
            updateStats(result) {
                if (result === 'win') this.gameStats.wins++;
                else if (result === 'loss') this.gameStats.losses++;
                else if (result === 'draw') this.gameStats.draws++;
                
                localStorage.setItem('chess3d_stats', JSON.stringify(this.gameStats));
            }
        }

        // Initialize the game when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            new ChessGame3D();
        });

        // Update todos to mark completion
        const updateTodo = (id, status) => {
            // This would update the todo status in a real implementation
            console.log(`Todo ${id} marked as ${status}`);
        };
